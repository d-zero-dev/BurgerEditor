name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Determine dist-tag
        id: dist-tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-"* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        # `from-package` (vs `from-git`): publishes only packages whose
        # current package.json version is NOT yet on the npm registry.
        # `from-git` re-attempts every package at the tag, which means a
        # partial-publish failure (e.g. sigstore transparency log 409 on
        # one package mid-batch) cannot be recovered by re-running — the
        # already-published packages re-trigger the 409 and abort the
        # whole job before the unpublished ones get their turn.
        run: npx lerna publish from-package --dist-tag ${{ steps.dist-tag.outputs.tag }} --yes
