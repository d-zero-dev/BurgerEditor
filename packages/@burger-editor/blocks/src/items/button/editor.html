<div>
	<label>
		<span>ボタンの種類</span>
		<select name="bge-kind">
			<!-- 選択肢はJavaScriptで動的に生成されます -->
		</select>
	</label>
	<label>
		<span>テキスト</span>
		<input type="text" name="bge-text" />
	</label>
	<label>
		<span>サブテキスト</span>
		<input type="text" name="bge-subtext" />
	</label>
	<label>
		<span>リンク</span>
		<input type="text" name="bge-link" />
	</label>
	<label>
		<span>ターゲット</span>
		<select name="bge-target">
			<option value="">指定なし</option>
			<option value="_blank">新しいウィンドウ(_blank)</option>
			<option value="_top">最上部ウィンドウ(_top)</option>
			<option value="_self">同じウィンドウ(_self)</option>
		</select>
	</label>
</div>
