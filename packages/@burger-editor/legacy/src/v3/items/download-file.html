<div data-bgb="download-file" class="bgb-download-file">

		<div class="bgt-download-file">
			<a class="bgt-download-file__link" href="/path/to/file.pdf" target="_blank" data-bge="path:href, download:download">
				<i class="bgt-link__icon bgt-link__icon--before" role="presentation"></i>
				<span class="bgt-link__name" data-bge="name"></span>

			</a>
		</div>
	</div>
</div>
