<div data-bgt="trimmed-image" data-bgt-ver="2.4.0" class="bgt-container bgt-trimmed-image-container">
	<div class="bgt-trimmed-image" data-bge-popup="1" data-bge-empty="0" data-bge="popup:data-bge-popup, empty:data-bge-empty">
		<a class="bgt-image__link" href="/path/to/image.png" data-bge="path:href">
			<figure class="bgt-link__box">
				<div class="bgt-box__image" data-bge="path:style(background-image), alt" style="background-image: url('/path/to/image.png')"></div>
				<figcaption class="bgt-box__caption" data-bge="caption"></figcaption>
			</figure>
		</a>
	</div>
</div>
