<div data-bgt="trimmed-image-link" data-bgt-ver="2.1.0" class="bgt-container bgt-trimmed-image-link-container">
	<div class="bgt-trimmed-image-link" data-bge-empty="0" data-bge="empty:data-bge-empty">
		<a class="bgt-trimmed-image-link__link" href="" data-bge="link:href, target:target">
			<figure class="bgt-link__box">
				<div class="bgt-box__image" data-bge="path:style(background-image), alt" style="background-image: url('/path/to/image.png')"></div>
				<figcaption class="bgt-box__caption" data-bge="caption"></figcaption>
			</figure>
		</a>
	</div>
</div>
